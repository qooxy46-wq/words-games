        /* 明亮的高科技战术室，不回退黑暗 */
        body {
            margin: 0; padding: 0; background-color: #f8fafc; 
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; cursor: none; transition: background 0.3s ease; 
            touch-action: manipulation;
        }

        body.enlightened {
            background-color: #ffffff; 
            box-shadow: inset 0 0 100px rgba(34, 197, 94, 0.2); 
            cursor: default;
        }

        #game-container { width: 100vw; height: 100vh; position: relative; perspective: 1000px; }

        #ui-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 100; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); padding: 10px 40px; border-radius: 12px; 
            border: 2px solid #38bdf8; box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3); transition: 0.3s;
        }

        body.enlightened #ui-top { border-color: #22c55e; box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4); }
        #mission-text { color: #0284c7; margin: 0 0 10px 0; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        
        .zh-highlight {
            display: inline-block; background: #fffbeb; color: #ea580c; 
            padding: 8px 25px; border-radius: 8px; font-size: 36px; font-weight: 900;
            border: 3px solid #f59e0b; box-shadow: 0 0 25px rgba(245, 158, 11, 0.6);
            letter-spacing: 2px; text-shadow: 1px 1px 0px #fff;
        }

        #round-select {
            font-size: 16px; padding: 5px 10px; margin-bottom: 10px; border-radius: 5px;
            border: 2px solid #38bdf8; background: #fff; color: #0284c7; font-weight: bold; cursor: pointer; outline: none;
        }

        #score-board {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); border: 2px solid #38bdf8; color: #0f172a; 
            padding: 10px 25px; border-radius: 6px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); transition: 0.3s;
        }
        body.enlightened #score-board { border-color: #22c55e; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .highlight-number { color: #0284c7; font-size: 24px; margin: 0 5px; }
        .poop-number { color: #ef4444; font-size: 24px; margin: 0 5px; } 

        #target-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .target { position: absolute; width: 140px; height: 140px; border-radius: 50%; perspective: 1000px; animation: sway 4s infinite ease-in-out alternate; transition: opacity 0.8s ease; }
        
        .shortcut-badge {
            position: absolute; top: -15px; left: -15px;
            background: #0ea5e9; color: #fff; width: 36px; height: 36px;
            border-radius: 50%; font-size: 22px; line-height: 32px; 
            text-align: center; font-weight: 900;
            border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 50; font-family: monospace;
        }

        .target-inner { position: relative; width: 100%; height: 100%; transition: transform 0.01s linear; transform-style: preserve-3d; }
        .target.flipped .target-inner { transform: rotateY(180deg); }
        
        .target-front, .target-back { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        
        .target-front { background: repeating-radial-gradient( #ffffff 0, #ffffff 15px, #ef4444 15px, #ef4444 30px, #ffffff 30px, #ffffff 45px, #ef4444 45px, #ef4444 60px, #e2e8f0 60px, #e2e8f0 70px ); border: 2px solid #cbd5e1; }
        .target-back { background: #ef4444; transform: rotateY(180deg); border: 6px solid #b91c1c; box-sizing: border-box; color: white; font-size: 22px; font-weight: 900; text-align: center; padding: 5px; }
        .target-text { background: rgba(255, 255, 255, 0.95); color: #0f172a; padding: 5px 12px; border-radius: 4px; font-size: 22px; font-weight: 900; border: 2px solid #38bdf8; pointer-events: none; }
        
        .target.selected .target-inner { transform: scale(1.1); }
        .target.selected .target-front { box-shadow: 0 0 30px #22c55e; }
        .target.selected .target-text { background: #22c55e; color: #fff; border-color: #fff; }

        @keyframes sway { 0% { transform: translateY(-10px); } 100% { transform: translateY(10px); } }

        .bullet-hole { position: absolute; width: 12px; height: 12px; background: #333; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 40; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); transition: opacity 0.5s; }

        .poop-splat { 
            position: fixed; font-size: 40px; pointer-events: none; z-index: 10000; 
            margin-top: 30px; margin-left: 50px; 
            transform: translate(-50%, -50%) scale(0); 
            animation: splat 1.5s ease-out forwards; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); 
        }
        @keyframes splat { 
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; } 
            15% { transform: translate(-50%, -50%) scale(1.2) rotate(25deg); } 
            30% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); } 
            80% { transform: translate(-50%, -50%) scale(1) translateY(0); opacity: 1; } 
            100% { transform: translate(-50%, -50%) scale(1) translateY(150px); opacity: 0; } 
        }

        .flower-drop { position: fixed; top: -15%; z-index: 10001; pointer-events: none; animation: flowerFall linear forwards; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        @keyframes flowerFall { 0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(120vh) rotate(360deg) scale(1.2); opacity: 0; } }

        .massive-poop {
            position: fixed; pointer-events: none; z-index: 20001; 
            animation: fallDown 3s ease-in forwards; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }
        @keyframes fallDown { 0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(120vh) rotate(360deg); opacity: 0; } }

        #scope { 
            position: fixed; width: 300px; height: 300px; border: 3px solid #0284c7; border-radius: 50%; 
            box-shadow: 0 0 0 9999px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(0,0,0,0.05); 
            pointer-events: none; transform: translate(-50%, -50%); z-index: 999; 
            transition: width 0.1s, height 0.1s, opacity 0.3s ease, box-shadow 0.3s ease; 
        }
        #scope.hidden { opacity: 0 !important; box-shadow: 0 0 0 0px rgba(0, 0, 0, 0) !important; }
        #scope::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(239, 68, 68, 0.8); transform: translateY(-50%); }
        #scope::after { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: rgba(239, 68, 68, 0.8); transform: translateX(-50%); }
        .scope-center { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #ef4444; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);}
        .recoil { width: 320px !important; height: 320px !important; margin-top: -15px; }

        #praise-msg { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 90px; font-weight: 900; color: #f59e0b; text-shadow: 0px 0px 20px #fde68a, 2px 2px 0 #fff; display: none; z-index: 900; pointer-events: none; font-style: italic; white-space: nowrap; }

        #end-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.95); z-index: 20000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            cursor: default;
        }
        #end-title { font-size: 60px; font-weight: 900; margin-bottom: 20px; text-align: center; padding: 0 20px;}
        #end-stats { font-size: 30px; color: #334155; margin-bottom: 40px; font-weight: bold; }
        #restart-btn {
            padding: 15px 40px; font-size: 24px; border: none; border-radius: 8px;
            background: #0ea5e9; color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); transition: 0.3s;
        }
        #restart-btn:hover { background: #0284c7; transform: scale(1.05); }

        #ui-bottom { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; cursor: default; }
        button.nav-btn { padding: 10px 30px; font-size: 18px; border: 1px solid transparent; border-radius: 4px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.2s; }
        #prev-btn { background: #334155; color: white; border-color: #475569; }
        #prev-btn:hover:not(:disabled) { background: #475569; border-color: #94a3b8; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { cursor: auto; }
            #ui-top { width: 90%; padding: 10px 15px; top: 10px; box-sizing: border-box; }
            #mission-text { font-size: 16px; margin-bottom: 5px; }
            .zh-highlight { font-size: 24px; padding: 5px 15px; }
            #round-select { font-size: 14px; padding: 3px 8px; margin-bottom: 5px; }
            #score-board {
                top: auto; bottom: 85px; left: 50%; transform: translateX(-50%);
                width: 95%; box-sizing: border-box; text-align: center;
                font-size: 14px; padding: 8px; display: flex; justify-content: space-around;
                border-radius: 8px;
            }
            .highlight-number, .poop-number { font-size: 18px; margin: 0 2px; }
            .target { width: 75px; height: 75px; margin-left: 32px; }
            .target-text { font-size: 13px; padding: 2px 4px; border-width: 1px; }
            .target-back { font-size: 14px; padding: 2px; border-width: 3px; }
            .shortcut-badge { width: 20px; height: 20px; font-size: 12px; line-height: 16px; top: -6px; left: -6px; border-width: 2px; }
            #scope { display: none !important; }
            #praise-msg { font-size: 50px; }
            .poop-splat { font-size: 30px !important; margin-top: 10px; margin-left: 20px; }
            #ui-bottom { bottom: 15px; width: 100%; justify-content: center; gap: 15px; }
            button.nav-btn { padding: 10px 20px; font-size: 14px; }
            #end-title { font-size: 28px; }
            #end-stats { font-size: 18px; margin-bottom: 20px; }
            #restart-btn { font-size: 18px; padding: 10px 20px; }
        }

            "perfect","完美的","produce","生产","home","家","mark","标记","match","匹配","mention","提及","might","可能","name","命名","pull","拉","punish","惩罚","remain","保持",
            "occupy","占据","operation","操作","optimistic","乐观的","paper","纸张","risk","风险","pause","暂停","sharp","尖的","phone","电话","should","应该","picture","照片",
            "sight","视野","positive","积极的","sorrow","悲伤","program","项目","sound","声音","progress","进步","store","商店","recommend","推荐","suddenly","突然地","reflect","反映",
            "tear","眼泪","thus","因此","reliable","可靠的","warm","温暖","replace","替代","abandon","抛弃","rich","丰富的","above","在上面","sell","卖","advantage","优势",
            "shape","形状","award","奖励","situation","情况","basically","基本地","spare","空闲的","borrow","借","spend","花费","bright","明亮的","story","故事","cause","造成",
            "talent","才华","certain","确定的","thank","感谢","child","孩子","then","然后","commitment","承诺","throw","扔","complete","完成","trip","旅行","convenient","方便的"
        ];

        // 动态将一维数组切分为 50词 一轮的数据结构
        const roundsData = [];
        let currentRound = [];
        for(let i = 0; i < rawTextData.length; i += 2) {
            currentRound.push({en: rawTextData[i], zh: rawTextData[i+1]});
            if(currentRound.length === 50) {
                roundsData.push(currentRound);
                currentRound = [];
            }
        }
        if(currentRound.length > 0) roundsData.push(currentRound); // 最后一轮不满50的兜底

        // 初始化下拉菜单
        const selectElement = document.getElementById('round-select');
        roundsData.forEach((round, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = `第 ${index + 1} 轮 (共 ${round.length} 词)`;
            selectElement.appendChild(opt);
        });

        const praises = ["HEADSHOT!", "精准命中!", "完美击杀!", "一发入魂!", "TARGET DOWN!"];

        let currentRoundIndex = 0;
        let vocabData = roundsData[currentRoundIndex];
        let currentLevel = 0;
        let levelCompleted = false; 
        
        let score = 0;
        let poopCount = 0; 
        let firstTry = true; 

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playGunshot() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);
        }

        function speakVoice(text, isSuper = false) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            if(isSuper) {
                utterance.rate = 1.1;
                utterance.pitch = 1.5; 
            } else {
                utterance.rate = 0.9;
            }
            window.speechSynthesis.speak(utterance);
        }

        function throwPoop(x, y) {
            const poop = document.createElement('div');
            poop.className = 'poop-splat';
            poop.textContent = '💩';
            poop.style.left = x + 'px'; poop.style.top = y + 'px';
            document.body.appendChild(poop);
            setTimeout(() => poop.remove(), 1500);
        }

        function throwMassivePoopPunishment() {
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const poop = document.createElement('div');
                    poop.className = 'massive-poop';
                    poop.textContent = '💩';
                    poop.style.left = (Math.random() * 100) + 'vw';
                    poop.style.fontSize = (Math.random() * 80 + 60) + 'px';
                    document.body.appendChild(poop);
                    setTimeout(() => poop.remove(), 3500);
                }, i * 80); 
            }
        }

        function triggerFlowerShower() {
            const flowers = ['🌸', '🌹', '🌻', '🌺', '🌷', '🌼'];
            for(let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const f = document.createElement('div'); f.className = 'flower-drop';
                    f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = (Math.random() * 40 + 30) + 'px';
                    f.style.animationDuration = (Math.random() * 3 + 2) + 's'; 
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 6000);
                }, Math.random() * 2000); 
            }
        }

        function updateScoreBoard() {
            document.getElementById('total-score').textContent = score;
            document.getElementById('poop-score').textContent = poopCount;
            document.getElementById('level-progress').textContent = `${currentLevel + 1}/${vocabData.length}`;
        }

        document.getElementById('round-select').addEventListener('change', (e) => {
            currentRoundIndex = parseInt(e.target.value);
            vocabData = roundsData[currentRoundIndex];
            e.target.blur(); 
            resetGame();
        });

        function resetGame() {
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('scope').style.display = 'block';
            document.body.style.cursor = 'none';
            currentLevel = 0; score = 0; poopCount = 0; 
            updateScoreBoard(); loadLevel(0);
            
            if(window.innerWidth <= 768) {
                document.body.style.cursor = 'auto'; 
            }
        }

        document.getElementById('restart-btn').addEventListener('click', resetGame);

        const container = document.getElementById('game-container');
        const scope = document.getElementById('scope');
        const targetArea = document.getElementById('target-area');
        const zhDisplay = document.getElementById('current-zh');
        const praiseMsg = document.getElementById('praise-msg');
        const prevBtn = document.getElementById('prev-btn');

        document.addEventListener('mousemove', (e) => {
            if (!document.body.classList.contains('enlightened')) { 
                scope.style.left = e.clientX + 'px'; scope.style.top = e.clientY + 'px'; 
            }
        });

        document.addEventListener('mousedown', (e) => {
            if(levelCompleted) return; 
            if(e.target.closest('#ui-top') || e.target.closest('#score-board') || e.target.closest('#ui-bottom')) return;

            playGunshot(); 
            if (!document.body.classList.contains('enlightened')) {
                scope.classList.add('recoil'); setTimeout(() => scope.classList.remove('recoil'), 100);
            }

            const hole = document.createElement('div');
            hole.className = 'bullet-hole'; hole.style.left = e.clientX + 'px'; hole.style.top = e.clientY + 'px';
            targetArea.appendChild(hole);
        });

        document.addEventListener('keydown', (e) => {
            if(levelCompleted || document.getElementById('end-screen').style.display === 'flex') return;
            const key = e.key;
            if(['1', '2', '3', '4'].includes(key)) {
                const index = parseInt(key) - 1;
                const targets = document.querySelectorAll('.target');
                if(targets[index]) {
                    const rect = targets[index].getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const event = new MouseEvent('mousedown', {
                        bubbles: true, cancelable: true,
                        clientX: centerX, clientY: centerY
                    });
                    targets[index].dispatchEvent(event);
                }
            }
        });

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function loadLevel(index) {
            levelCompleted = false;
            firstTry = true; 

            document.body.classList.remove('enlightened');
            scope.classList.remove('hidden');

            targetArea.innerHTML = ''; 
            praiseMsg.style.display = 'none';
            
            updateScoreBoard();

            const currentData = vocabData[index];
            zhDisplay.textContent = currentData.zh;

            let optionsObj = [currentData];
            let distractors = vocabData.filter(v => v.en !== currentData.en);
            distractors = shuffle(distractors).slice(0, 3);
            optionsObj = shuffle(optionsObj.concat(distractors));

            const colWidth = 100 / 4; 

            optionsObj.forEach((wordObj, i) => {
                const target = document.createElement('div'); target.className = 'target';
                const inner = document.createElement('div'); inner.className = 'target-inner';
                const front = document.createElement('div'); front.className = 'target-front';
                
                const badge = document.createElement('div'); badge.className = 'shortcut-badge';
                badge.textContent = i + 1;
                front.appendChild(badge);

                const span = document.createElement('span'); span.className = 'target-text';
                span.textContent = wordObj.en; front.appendChild(span);
                const back = document.createElement('div'); back.className = 'target-back';
                back.textContent = wordObj.zh;

                inner.appendChild(front); inner.appendChild(back); target.appendChild(inner);
                
                const leftPos = (i * colWidth) + (colWidth / 2);
                const topPos = Math.random() * 45 + 25; 
                target.style.left = `calc(${leftPos}% - 70px)`; target.style.top = topPos + '%';
                target.style.animationDelay = (Math.random() * 2) + 's';

                target.addEventListener('mousedown', (e) => {
                    if (levelCompleted) return; 
                    speakVoice(wordObj.en); 

                    if (wordObj.en !== currentData.en) {
                        firstTry = false; 
                        poopCount++; 
                        updateScoreBoard(); 

                        document.querySelectorAll('.target').forEach(t => t.classList.remove('selected'));
                        
                        target.classList.add('flipped');
                        throwPoop(e.clientX, e.clientY);
                        
                        // 0.2秒极限翻转，逼迫瞬间记忆
                        setTimeout(() => {
                            target.classList.remove('flipped');
                        }, 200);

                    } else {
                        levelCompleted = true;
                        document.querySelectorAll('.target').forEach(t => t.classList.remove('selected'));
                        target.classList.add('selected');

                        let earnedPoint = false;
                        if (firstTry) {
                            score += 1;
                            earnedPoint = true;
                        }
                        updateScoreBoard();

                        document.body.classList.add('enlightened');
                        scope.classList.add('hidden');
                        
                        document.querySelectorAll('.target:not(.selected)').forEach(t => t.style.opacity = '0');
                        document.querySelectorAll('.bullet-hole').forEach(h => h.style.opacity = '0');

                        if (earnedPoint && score > 0 && score % 10 === 0) {
                            praiseMsg.textContent = "🔥 十连绝杀！🔥";
                            praiseMsg.style.display = 'block';
                            speakVoice("Godlike!", true); 
                        } else {
                            confetti({ particleCount: 150, spread: 120, origin: { y: 0.5 }, colors: ['#0284c7', '#facc15', '#22c55e'] });
                            
                            if (!firstTry) {
                                praiseMsg.textContent = "终于击杀！下次争取一发入魂！";
                                praiseMsg.style.color = "#f87171"; 
                            } else {
                                praiseMsg.textContent = praises[Math.floor(Math.random() * praises.length)];
                                praiseMsg.style.color = "#f59e0b"; 
                            }
                            praiseMsg.style.display = 'block';
                        }

                        setTimeout(() => {
                            if (currentLevel < vocabData.length - 1) {
                                currentLevel++;
                                loadLevel(currentLevel);
                            } else {
                                showEndScreen();
                            }
                        }, 1500);
                    }
                });
                targetArea.appendChild(target);
            });
        }

        prevBtn.addEventListener('click', () => { 
            if (currentLevel > 0) { currentLevel--; loadLevel(currentLevel); } 
        });

        function showEndScreen() {
            const endScreen = document.getElementById('end-screen');
            const endTitle = document.getElementById('end-title');
            const endStats = document.getElementById('end-stats');
            
            document.body.style.cursor = 'default';
            document.getElementById('scope').style.display = 'none';

            endStats.textContent = `🎯 最终得分：${score}  |  💩 吃屎总数：${poopCount}`;
            
            if (poopCount > score) {
                endTitle.textContent = "🚨 战术翻车！吃屎吃到饱！太菜了吧老铁！ 🚨";
                endTitle.style.color = "#ef4444";
                throwMassivePoopPunishment();
                speakVoice("Game over!", true);
            } else if (score > poopCount) {
                endTitle.textContent = "🏆 词汇特种兵，YYDS！这语感简直绝绝子！ 🏆";
                endTitle.style.color = "#f59e0b";
                triggerFlowerShower();
                triggerFlowerShower(); 
                confetti({ particleCount: 300, spread: 160, origin: { y: 0.3 } });
                speakVoice("Unbelievable! You are the Best!", true);
            } else {
                endTitle.textContent = "⚖️ 五五开！差一点就被屎淹没了！ ⚖️";
                endTitle.style.color = "#3b82f6";
            }
            
            endScreen.style.display = 'flex';
        }

        document.body.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });

        if(window.innerWidth <= 768) {
            document.body.style.cursor = 'auto'; 
        }

        loadLevel(currentLevel);
    </script>
</body>
</html>
